<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defender Name Picker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #0f0;
            text-shadow: 2px 2px #005500;
            font-size: 24px;
            margin-top: 20px;
        }

        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #111;
            padding: 20px;
            border: 4px solid #0f0;
            border-radius: 10px;
            margin-top: 20px;
            width: 80%;
            max-width: 600px;
            z-index: 10;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: #000;
            border: 2px solid #0f0;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
        }

        button {
            padding: 10px 15px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            text-transform: uppercase;
        }

        button:hover {
            background: #fff;
        }

        button:disabled {
            background: #555;
            color: #222;
            cursor: not-allowed;
        }

        #name-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #333;
        }

        #name-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 2px solid #222;
            font-size: 12px;
        }

        #name-list li:last-child {
            border-bottom: none;
        }

        .remove-btn {
            background: #f00;
            color: #fff;
            padding: 5px 10px;
            font-size: 10px;
        }

        .remove-btn:hover {
            background: #fff;
            color: #f00;
        }

        #start-btn {
            font-size: 16px;
            padding: 15px 30px;
            background: #f00;
            color: #fff;
            border: 4px solid #fff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #game-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        canvas {
            display: block;
        }

        #winner-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 4px solid #ff0;
            box-shadow: 0 0 20px #ff0;
        }

        #winner-text {
            color: #ff0;
            font-size: 40px;
            margin-bottom: 30px;
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>DEFENDER PICKER</h1>
        <div class="input-group">
            <input type="text" id="name-input" placeholder="ENTER PLAYER NAME..." autocomplete="off">
            <button id="add-btn">ADD</button>
        </div>
        <ul id="name-list"></ul>
        <button id="start-btn" disabled>START MISSION</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="winner-screen">
        <h2 style="color: #fff; font-size: 20px;">SURVIVOR & WINNER</h2>
        <div id="winner-text"></div>
        <button onclick="resetGame()" style="font-size: 16px; padding: 15px;">PLAY AGAIN</button>
    </div>

    <script>
        // --- UI & State Management ---
        let participants = [];
        const nameInput = document.getElementById('name-input');
        const addBtn = document.getElementById('add-btn');
        const nameList = document.getElementById('name-list');
        const startBtn = document.getElementById('start-btn');
        const uiContainer = document.getElementById('ui-container');
        const gameContainer = document.getElementById('game-container');
        const winnerScreen = document.getElementById('winner-screen');
        const winnerText = document.getElementById('winner-text');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function updateUI() {
            nameList.innerHTML = '';
            participants.forEach((name, index) => {
                const li = document.createElement('li');
                li.textContent = name;
                const removeBtn = document.createElement('button');
                removeBtn.textContent = 'X';
                removeBtn.className = 'remove-btn';
                removeBtn.onclick = () => {
                    participants.splice(index, 1);
                    updateUI();
                };
                li.appendChild(removeBtn);
                nameList.appendChild(li);
            });
            startBtn.disabled = participants.length < 2;
        }

        addBtn.addEventListener('click', () => {
            const name = nameInput.value.trim().toUpperCase();
            if (name && !participants.includes(name)) {
                participants.push(name);
                nameInput.value = '';
                updateUI();
            }
        });

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addBtn.click();
        });

        startBtn.addEventListener('click', () => {
            uiContainer.style.display = 'none';
            gameContainer.style.display = 'block';
            resizeCanvas();
            initAudio();
            startGame();
        });

        function resetGame() {
            winnerScreen.style.display = 'none';
            gameContainer.style.display = 'none';
            uiContainer.style.display = 'flex';
        }

        // --- Audio System (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playShootSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplosionSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- Game Engine ---
        let width, height;
        let animationId;
        let entities = [];
        let particles = [];
        let stars = [];
        let terrain = [];
        let player;
        let lastShootTime = 0;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);

        class Player {
            constructor() {
                this.x = 100;
                this.y = height / 2;
                this.targetY = height / 2;
                this.speed = 4;
            }
            update() {
                // Move towards target Y smoothly
                this.y += (this.targetY - this.y) * 0.05;
            }
            draw() {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - 20, this.y - 10);
                ctx.lineTo(this.x - 20, this.y + 10);
                ctx.fill();
                
                // Engine thrust
                if (Math.random() > 0.5) {
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(this.x - 28, this.y - 2, 8, 4);
                }
            }
        }

        class Enemy {
            constructor(name) {
                this.name = name;
                this.x = width + Math.random() * 500;
                this.y = 50 + Math.random() * (height - 200);
                this.baseY = this.y;
                this.speedX = 1 + Math.random() * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.destroyed = false;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            update() {
                this.x -= this.speedX;
                this.angle += 0.05;
                this.y = this.baseY + Math.sin(this.angle) * 30;

                // Wrap around screen
                if (this.x < -100) {
                    this.x = width + 50;
                    this.baseY = 50 + Math.random() * (height - 200);
                }
            }
            draw() {
                // Draw Ship
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x - 15, this.y - 10);
                ctx.lineTo(this.x + 15, this.y - 10);
                ctx.lineTo(this.x + 20, this.y + 5);
                ctx.lineTo(this.x - 20, this.y + 5);
                ctx.fill();

                // Draw Name
                ctx.fillStyle = '#fff';
                ctx.font = '10px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, this.x, this.y - 20);
            }
        }

        class Laser {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                this.speed = 15;
                const angle = Math.atan2(targetY - y, targetX - x);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.active = true;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x > width || this.x < 0 || this.y > height || this.y < 0) {
                    this.active = false;
                }
            }
            draw() {
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx, this.y - this.vy);
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.03;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 4, 4);
                ctx.globalAlpha = 1.0;
            }
        }

        function generateTerrain() {
            terrain = [];
            let currentY = height - 50;
            for (let i = 0; i < width + 100; i += 20) {
                currentY += (Math.random() - 0.5) * 40;
                currentY = Math.max(height - 150, Math.min(height - 20, currentY));
                terrain.push({ x: i, y: currentY });
            }
        }

        function generateStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    speed: 0.5 + Math.random() * 2
                });
            }
        }

        let enemies = [];
        let lasers = [];

        function startGame() {
            generateTerrain();
            generateStars();
            player = new Player();
            enemies = participants.map(name => new Enemy(name));
            lasers = [];
            particles = [];
            lastShootTime = Date.now();
            gameLoop();
        }

        function createExplosion(x, y, color) {
            playExplosionSound();
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Draw Stars
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) star.x = width;
                ctx.fillRect(star.x, star.y, 2, 2);
            });

            // Draw Terrain
            ctx.strokeStyle = '#f0f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            terrain.forEach((pt, i) => {
                pt.x -= 2; // Scroll speed
                if (i === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            });
            ctx.stroke();

            // Recycle terrain points to keep it continuous
            if (terrain[0].x < -20) {
                terrain.shift();
                let lastY = terrain[terrain.length - 1].y;
                let newY = lastY + (Math.random() - 0.5) * 40;
                newY = Math.max(height - 150, Math.min(height - 20, newY));
                terrain.push({ x: terrain[terrain.length - 1].x + 20, y: newY });
            }

            // Game Logic
            if (enemies.length > 1) {
                const now = Date.now();
                // Shoot every 1.5 seconds
                if (now - lastShootTime > 1500) {
                    const targetEnemy = enemies[Math.floor(Math.random() * enemies.length)];
                    player.targetY = targetEnemy.y; // Move player to align
                    
                    // Fire laser
                    setTimeout(() => {
                        lasers.push(new Laser(player.x, player.y, targetEnemy.x, targetEnemy.y));
                        playShootSound();
                    }, 300); // Slight delay to let ship move
                    
                    lastShootTime = now;
                }
            }

            player.update();
            player.draw();

            // Update & Draw Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.update();
                l.draw();

                // Collision detection
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    let dist = Math.hypot(l.x - e.x, l.y - e.y);
                    if (dist < 20) {
                        createExplosion(e.x, e.y, e.color);
                        enemies.splice(j, 1);
                        l.active = false;
                        break;
                    }
                }

                if (!l.active) lasers.splice(i, 1);
            }

            // Update & Draw Enemies
            enemies.forEach(e => {
                e.update();
                e.draw();
            });

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Check Win Condition
            if (enemies.length === 1 && particles.length === 0) {
                winnerText.textContent = enemies[0].name;
                winnerScreen.style.display = 'block';
                return; // Stop the loop
            }

            animationId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
